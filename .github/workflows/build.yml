name: Build ytdlp-gui for Arch Linux

on:
  schedule:
    - cron: '0 0 1 * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: BKSalman/ytdlp-gui
          ref: main

      # Run a native Arch Linux container, install tools, and build
      - name: Build inside Arch Linux
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace archlinux:latest sh -c "
            pacman -Syu --noconfirm base-devel rustup cmake pkgconf gtk3 git &&
            rustup toolchain install stable &&
            rustup default stable &&
            cargo build --release &&
            cp target/release/ytdlp-gui ./ytdlp-gui-arch &&
            chmod 777 ./ytdlp-gui-arch
          "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytdlp-gui-arch
          path: ./ytdlp-gui-arch